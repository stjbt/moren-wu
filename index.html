<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可加标题</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

body, html {
  margin:0; padding:0;
  width:100%; height:100%;
  overflow:hidden;
  display:flex; justify-content:center; align-items:center;
  font-family: 'Great Vibes', cursive, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  background:#000;
}

#bg-video {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition: opacity 1.5s ease-in;
}

#start-btn {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:20px 40px;
  font-size:22px;
  background:rgba(255,255,255,0.8);
  border:none;
  border-radius:12px;
  cursor:pointer;
  z-index:10;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

/* 信纸容器 */
#scroll-container {
  width:90%; max-width:600px; height:90%;
  overflow-y: hidden; /* 写信过程中隐藏滚动条 */
  -webkit-overflow-scrolling: touch;
  position:relative;
}

/* 信纸样式 */
.letter-container {
  padding:50px 30px;
  border-radius:20px;
  font-size:24px;
  line-height:1.6;
  color:#4a2e1c;
  text-shadow:1px 1px 2px rgba(0,0,0,0.5);
  background: rgba(210,180,140,0.7);
  white-space:pre-wrap;
  opacity:0;
  transition: opacity 1.5s ease-in;
  position: relative; /* 相对定位，方便 transform 自动滚动 */
}

.letter-container span {
  opacity:0;
  transform: translateY(20px) rotate(2deg);
  display:inline-block;
  position:relative;
  animation: write 0.4s forwards;
}

@keyframes write {
  0% {opacity:0; transform: translateY(20px) rotate(2deg);}
  60% {opacity:1; transform: translateY(-2px) rotate(-1deg);}
  100% {opacity:1; transform: translateY(0) rotate(0);}
}

.ink-drop {
  position:absolute;
  width:8px; height:8px;
  background: rgba(0,0,0,0.3);
  border-radius:50%;
  animation: drip 1s forwards;
  pointer-events:none;
}

@keyframes drip {
  0% {opacity:1; transform: translateY(0) scale(0.5);}
  100% {opacity:0; transform: translateY(20px) scale(1);}
}
</style>
</head>
<body>

<video id="bg-video" playsinline webkit-playsinline loop>
  <source src="video.mp4" type="video/mp4">
</video>

<audio id="bg-music" src="music.mp3" loop></audio>
<audio id="ink-sound" src="ink.mp3"></audio>

<button id="start-btn">可改</button>

<div id="scroll-container">
  <div class="letter-container" id="letter"></div>
</div>

<script>
const letterText = `
亲爱的xx：
此处省略1万字
`;

const container = document.getElementById('letter');
const inkSound = document.getElementById('ink-sound');
const bgMusic = document.getElementById('bg-music');
const bgVideo = document.getElementById('bg-video');
const startBtn = document.getElementById('start-btn');
const scrollContainer = document.getElementById('scroll-container');

let index = 0;
let autoScrollSpeed = 0.5;
let scrollPos = 0;
let autoScrolling = true;

function writeLetter(){
  if(index < letterText.length){
    const span = document.createElement('span');
    span.textContent = letterText[index];
    span.style.animationDelay = (index*0.05)+'s';
    container.appendChild(span);

    if(letterText[index]!=='\n'){
      inkSound.currentTime=0;
      inkSound.play();
    }

    if(Math.random()<0.03 && letterText[index]!=='\n'){
      const drop=document.createElement('div');
      drop.className='ink-drop';
      drop.style.top=(span.offsetTop+5)+'px';
      drop.style.left=(span.offsetLeft+Math.random()*5)+'px';
      container.appendChild(drop);
      setTimeout(()=>drop.remove(),1000);
    }

    index++;
    setTimeout(writeLetter,50);
  } else { 
    // 写完信后停止自动滚动
    autoScrolling = false;

    // 移除 transform，让信纸静态显示，手动滚动生效
    container.style.transform = 'none';
    container.style.position = 'static';
    scrollContainer.style.overflowY = 'auto';
  }
}

// 自动滚动函数
function autoScroll(){
  if(!autoScrolling) return;
  const totalHeight = container.scrollHeight - scrollContainer.clientHeight;
  if(scrollPos < totalHeight){
    scrollPos += autoScrollSpeed;
    container.style.transform = `translateY(${-scrollPos}px)`; // 用 transform 滚动
  }
  requestAnimationFrame(autoScroll);
}

startBtn.addEventListener('click', ()=>{
  bgVideo.play().then(()=>{ bgVideo.style.opacity = 1; }).catch(()=>{});
  bgVideo.volume = 0.7;

  container.style.opacity = 1;

  bgMusic.play();
  bgMusic.volume = 0.3;

  startBtn.style.display='none';
  writeLetter();
  autoScroll();
});
</script>
</body>
</html>
