<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给娇娇的秘密</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

body, html {
  margin:0; padding:0;
  width:100%; height:100%;
  display:flex; justify-content:center; align-items:center;
  font-family: 'Great Vibes', cursive, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  background:#000;
  overflow: hidden;
}

/* 背景视频容器 */
#video-wrapper {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 0;
  background: #000;
}

/* 视频本身，自适应屏幕，完整显示 */
#bg-video {
  position: absolute;
  top: 50%; left: 50%;
  width: 100%;
  height: 100%;
  transform: translate(-50%, -50%);
  object-fit: contain; /* 完整显示视频，不裁剪 */
  z-index:0;
  opacity:0; /* 渐入用 */
  transition: opacity 1.5s ease-in;
}

/* 点击按钮 */
#start-btn {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  padding:20px 40px;
  font-size:22px;
  background:rgba(255,255,255,0.8);
  border:none;
  border-radius:12px;
  cursor:pointer;
  z-index:10;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

/* 信纸容器 */
#scroll-container {
  width:90%; max-width:600px;
  height:100%;
  overflow:hidden;
  position:relative;
  z-index:1;
}

.letter-container {
  padding:50px 30px;
  border-radius:20px;
  font-size:24px;            
  line-height:1.6;            
  color:#4a2e1c;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  position:absolute;
  top:0; left:0; right:0;
  background: rgba(230,210,180,0.6);  
  transform-origin:center;
  animation: paperShake 3s infinite alternate ease-in-out;
  white-space:pre-wrap;
  opacity:0; /* 渐入 */
  transition: opacity 1.5s ease-in;
  z-index:1;
}

.letter-container span {
  opacity:0;
  transform: translateY(20px) rotate(2deg);
  display:inline-block;
  position:relative;
  animation: write 0.4s forwards;
}

@keyframes write {
  0% {opacity:0; transform: translateY(20px) rotate(2deg);}
  60% {opacity:1; transform: translateY(-2px) rotate(-1deg);}
  100% {opacity:1; transform: translateY(0) rotate(0);}
}

@keyframes paperShake {
  0% {transform: rotate(-0.5deg);}
  25% {transform: rotate(0.5deg);}
  50% {transform: rotate(-0.3deg);}
  75% {transform: rotate(0.3deg);}
  100% {transform: rotate(0deg);}
}

.ink-drop {
  position:absolute;
  width:8px; height:8px;
  background: rgba(0,0,0,0.3);
  border-radius:50%;
  animation: drip 1s forwards;
  pointer-events:none;
}

@keyframes drip {
  0% {opacity:1; transform: translateY(0) scale(0.5);}
  100% {opacity:0; transform: translateY(20px) scale(1);}
}
</style>
</head>
<body>

<!-- 背景视频容器 -->
<div id="video-wrapper">
  <video id="bg-video" playsinline webkit-playsinline loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<!-- 背景音乐（可选） -->
<audio id="bg-music" src="music.mp3" loop></audio>
<!-- 打字音效 -->
<audio id="ink-sound" src="ink.mp3"></audio>

<!-- 点击开始按钮 -->
<button id="start-btn">宝宝点击哦</button>

<div id="scroll-container">
  <div class="letter-container" id="letter"></div>
</div>

<script>
const letterText = `
亲爱的娇娇：
惊喜吧，我就是嘴硬，偷偷给你做了……（此处省略长信内容）
`;

const container = document.getElementById('letter');
const inkSound = document.getElementById('ink-sound');
const bgMusic = document.getElementById('bg-music');
const bgVideo = document.getElementById('bg-video');
const startBtn = document.getElementById('start-btn');

let index = 0;

function writeLetter(){
  if(index < letterText.length){
    const span = document.createElement('span');
    span.textContent = letterText[index];
    span.style.animationDelay = (index*0.05)+'s';
    container.appendChild(span);

    if(letterText[index]!=='\n'){
      inkSound.currentTime=0;
      inkSound.play();
    }

    if(Math.random()<0.03 && letterText[index]!=='\n'){
      const drop=document.createElement('div');
      drop.className='ink-drop';
      drop.style.top=(span.offsetTop+5)+'px';
      drop.style.left=(span.offsetLeft+Math.random()*5)+'px';
      container.appendChild(drop);
      setTimeout(()=>drop.remove(),1000);
    }

    index++;
    setTimeout(writeLetter,50);
  } else { 
    enableManualScroll();
  }
}

// 写完信后允许手动滚动
function enableManualScroll(){
  container.style.overflowY = "auto";  
  container.style.height = "100%";
  container.parentElement.style.overflow = "auto";
}

startBtn.addEventListener('click', ()=>{
  bgVideo.play().then(()=> bgVideo.style.opacity=1 ).catch(console.log);
  bgVideo.volume = 0.7;

  container.style.opacity = 1;

  bgMusic.play();
  bgMusic.volume = 0.3;

  startBtn.style.display='none';
  writeLetter();
});
</script>
</body>
</html>
